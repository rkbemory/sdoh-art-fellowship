<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SDOH ART Fellowship | Emory Nell Hodgson Woodruff School of Nursing</title>
  <meta name="description" content="Advanced Research Training in Social Determinants of Health (SDOH ART) — a mentored fellowship at Emory's Nell Hodgson Woodruff School of Nursing preparing nurse scientists to address the social drivers of health." />
  <meta property="og:title" content="SDOH ART Fellowship — Emory Nursing" />
  <meta property="og:description" content="A national NIH/NINR-funded fellowship training nurse scientists in the social determinants of health." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Open+Sans:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Primary">
      <a class="brand" href="#/home">
        <span class="wordmark">SDOH ART<br />Fellowship</span>
      </a>

      <nav class="nav-group" aria-label="Directory">
        <div class="nav-label">Directory</div>
        <button class="nav-item" data-route="#/fellows/2025">
          <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M17 20v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9.5 10a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7ZM22 20v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Fellows 2025
        </button>
        <button class="nav-item" data-route="#/fellows/2026">
          <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M17 20v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9.5 10a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7ZM22 20v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Fellows 2026
        </button>
        <button class="nav-item" data-route="#/fellows/2027">
          <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2ZM12 14v4M10 16h4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Fellows 2027
        </button>
        <button class="nav-item" data-route="#/faculty">
          <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M22 10 12 5 2 10l10 5 10-5ZM6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Faculty involved
        </button>
      </nav>

      <nav class="nav-group" aria-label="Media">
        <div class="nav-label">Media</div>
        <button class="nav-item" data-route="#/gallery">
          <svg class="ico" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1ZM8 11a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3ZM22 16l-5-5L6 22" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Photo Booth
        </button>
      </nav>

      <div class="sidebar-spacer"></div>

      <a class="btn-apply" href="#/apply">
        Apply now
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <div class="sidebar-foot">Emory University · Funded by NIH/NINR</div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="menu-toggle" id="menuToggle" aria-label="Open menu" aria-expanded="false">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <nav class="tabs" aria-label="Program">
          <button class="tab" data-route="#/about">About the fellowship</button>
          <button class="tab" data-route="#/framework">SDOH framework</button>
          <button class="tab" data-route="#/news">News</button>
          <button class="tab" data-route="#/apply">Apply</button>
          <button class="tab" data-route="#/inquiry">Inquiry</button>
        </nav>
        <label class="search">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="m20 20-3-3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="search" id="search" placeholder="Search fellows" aria-label="Search fellows" />
        </label>
      </header>

      <main class="content" id="main" tabindex="-1">
        <div class="loading">Loading…</div>
      </main>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>

  <!-- Hidden form for Netlify Forms detection (full field superset incl. uploads) -->
  <form name="application" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="application" />
    <input name="bot-field" />
    <input type="text" name="fullName" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="institution" />
    <input type="text" name="program" />
    <input type="text" name="credentials" />
    <input type="text" name="careerStage" />
    <input type="text" name="researchArea" />
    <input type="text" name="preferredMentor" />
    <textarea name="statement"></textarea>
    <input type="file" name="cv" />
    <input type="file" name="photo" />
    <textarea name="references"></textarea>
    <input type="text" name="hearAbout" />
    <input type="text" name="consent" />
  </form>

  <script src="assets/js/app.js"></script>
</body>
</html>
